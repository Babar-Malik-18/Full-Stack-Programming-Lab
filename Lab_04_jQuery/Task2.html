<!DOCTYPE html>
<html>

<head>
    <title>Fade Gallery</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <style>
        body {
            background: #111;
            color: white;
            text-align: center;
            padding: 40px;
        }

        img {
            width: 450px;
            height: 280px;
            border-radius: 12px;
        }

        .controls button {
            margin: 15px;
            padding: 8px 15px;
            border: none;
            background: #28a745;
            color: white;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <h2>Photo Gallery</h2>
    <img id="photo" src="https://picsum.photos/id/1050/450/280">
    <p id="text">Nature Forest</p>

    <div class="controls">
        <button id="back">Back</button>
        <button id="forward">Forward</button>
    </div>

    <script>
        $(function () {

            let data = [
                { src: "https://picsum.photos/id/1050/450/280", cap: "Nature Forest" },
                { src: "https://picsum.photos/id/1060/450/280", cap: "Cafe Road" },
                { src: "https://picsum.photos/id/1074/450/280", cap: "Animal View" }
            ];

            let i = 0;

            function update() {
                $("#photo").fadeOut(300, function () {
                    $(this).attr("src", data[i].src).fadeIn(300);
                });
                $("#text").hide().text(data[i].cap).fadeIn(300);
            }

            $("#forward").click(function () {
                i = (i + 1) % data.length;
                update();
            });

            $("#back").click(function () {
                i = (i - 1 + data.length) % data.length;
                update();
            });

        });
    </script>

</body>

</html>
