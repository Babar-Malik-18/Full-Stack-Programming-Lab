<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart List</title>
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>

    <style>
        body {
            font-family: Verdana;
            background: linear-gradient(to right, #74ebd5, #acb6e5);
            padding: 50px;
        }

        .container {
            width: 400px;
            margin: auto;
            background: white;
            padding: 20px;
            border-radius: 10px;
        }

        li {
            padding: 10px;
            margin: 6px 0;
            background: #f1f1f1;
            border-radius: 6px;
            display: flex;
            justify-content: space-between;
        }

        li:hover {
            background: #c8f7c5;
        }

        .remove {
            background: #ff4d4d;
            color: white;
            border: none;
            cursor: pointer;
            padding: 4px 8px;
        }
    </style>
</head>

<body>

    <div class="container">
        <h2>Task Manager</h2>
        <input type="text" id="taskInput" placeholder="Add task">
        <button id="addTask">Add</button>
        <ul id="taskList"></ul>
    </div>

    <script>
        $(function () {

            $("#addTask").on("click", function () {
                let value = $("#taskInput").val().trim();
                if (value != "") {
                    $("#taskList").append(
                        $("<li>").html(value + " <button class='remove'>X</button>")
                    );
                    $("#taskInput").val("");
                }
            });

            $("#taskList").on("click", ".remove", function () {
                $(this).parent().slideUp(300, function () {
                    $(this).remove();
                });
            });

        });
    </script>

</body>

</html>
